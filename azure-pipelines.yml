trigger:
- main

variables:
  azureServiceConnectionId: '83f7837f-28b3-43ac-a940-2dc057771536'
  webAppName: 'QuizAI'
  vmImageName: 'ubuntu-latest'
  environmentName: 'QuizAI'
  pythonVersion: '3.11'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: BuildJob
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    # Discover the app folder automatically (prefers a dir that has both app.py and requirements.txt)
    - bash: |
        set -e
        echo "Sources dir: $(Build.SourcesDirectory)"
        # Try to find a folder containing BOTH files
        CANDIDATE="$(find "$(Build.SourcesDirectory)" -maxdepth 5 -type f -name app.py -printf '%h\n' | while read d; do \
          if [ -f "$d/requirements.txt" ]; then echo "$d"; break; fi; done)"
        # Fallback: a folder containing requirements.txt
        if [ -z "$CANDIDATE" ]; then
          CANDIDATE="$(find "$(Build.SourcesDirectory)" -maxdepth 5 -type f -name requirements.txt -printf '%h\n' | head -n1)"
        fi
        if [ -z "$CANDIDATE" ]; then
          echo "##vso[task.logis]()
